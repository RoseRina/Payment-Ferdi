<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Pembayaran</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
            user-select: none;
        }
        .container {
            max-width: 750px;
            margin: auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        h1 {
            text-align: center;
            color: #444;
            font-size: 2em;
            margin-bottom: 10px;
        }
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            color: #555;
            text-align: center;
        }
        button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            background: linear-gradient(45deg, #0078d7, #00aaff);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* Bayangan untuk meningkatkan kontras */
        }
        button:hover {
            background: linear-gradient(45deg, #0063b1, #0099dd);
            transform: translateY(-2px);
        }
        button img {
            height: 30px;
            filter: brightness(1.5) contrast(1.2); /* Mencerahkan logo DANA */
        }
        .qris-container {
            text-align: center;
            margin: 20px 0;
        }
        .qris-container img {
            max-width: 300px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .highlight-note {
            text-align: center;
            margin: 20px auto;
            font-size: 16px;
            font-weight: bold;
            color: #d9534f;
            background-color: #fbe4e4;
            border: 2px solid #f5c6cb;
            padding: 15px;
            border-radius: 10px;
        }
        a {
            text-decoration: none;
            font-size: 18px;
            background-color: #25d366;
            color: #fff;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daftar Pembayaran</h1>
        <div class="highlight-note">
            ⚠️ <b>Catatan:</b> Klik nomor/rekening untuk menyalin ke clipboard.
        </div>

        <!-- E-Wallet Section -->
        <div>
            <p class="section-title">📲 E-Wallet (a/n Ferdi):</p>
            <!-- Tombol DANA yang diperjelas -->
            <button onclick="copyToClipboard('085281629923')">
                <img src="Logo/dana.png" alt="DANA">
            </button>
            <button onclick="copyToClipboard('085752083533')">
                <img src="Logo/ovo.png" alt="OVO">
            </button>
            <button onclick="copyToClipboard('085752083533')">
                <img src="Logo/gopay.png" alt="GOPAY">
            </button>
            <button onclick="copyToClipboard('085752083533')">
                <img src="Logo/linkaja.png" alt="LinkAja">
            </button>
            <button onclick="copyToClipboard('085752083533')">
                <img src="Logo/shopeepay.png" alt="ShopeePay">
            </button>
        </div>

        <!-- Bank Section -->
        <div>
            <p class="section-title">🏦 Rekening Bank (a/n Ferdi):</p>
            <button onclick="copyToClipboard('8171066191')">
                <img src="Logo/bca.png" alt="BCA">
            </button>
            <button onclick="copyToClipboard('369901056218536')">
                <img src="Logo/bri.png" alt="BRI">
            </button>
            <button onclick="copyToClipboard('901868798115')">
                <img src="Logo/seabank.png" alt="Seabank">
            </button>
        </div>

        <!-- QRIS Section -->
        <div class="qris-container">
            <p class="section-title">🔰 Payment QRIS:</p>
            <img id="qris-image" src="qris.jpg" alt="Kode QRIS Pembayaran">
            <br>
            <a href="qris.jpg" download="Payment_QRIS.jpg">📥 Download / Simpan QRIS</a>
        </div>

        <!-- Confirmation -->
        <div class="highlight-note">
            ⚠️ <b>Harap konfirmasi</b> ke Ferdi setelah transfer melalui
            <a href="https://wa.me/6285752083533" target="_blank">📲 WhatsApp</a>
        </div>
    </div>

    <script>
        // Fungsi Copy-to-Clipboard
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(function() {
                alert('Nomor berhasil disalin: ' + text);
            }).catch(function(err) {
                alert('Gagal menyalin nomor: ' + err);
            });
        }
    </script>
</body>
</html>
