<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Pembayaran</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            color: #333;
            user-select: none; /* Mencegah pemilihan teks */
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        .section-title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0 10px;
            color: #555;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #007bb5;
        }
        .qris-container {
            text-align: center;
            margin: 20px 0;
        }
        .qris-container img {
            max-width: 280px;
            border-radius: 8px;
        }
    </style>
    <script>
        // Mencegah klik kanan
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
            alert('Klik kanan dinonaktifkan!');
        });

        // Mencegah kombinasi Ctrl+U, Ctrl+S, Ctrl+Shift+I
        document.addEventListener('keydown', function (e) {
            if (e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'U' || e.key === 'S')) {
                alert('Akses ini dinonaktifkan!');
                e.preventDefault();
            }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                alert('Inspect Element dinonaktifkan!');
                e.preventDefault();
            }
            if (e.key === 'F12') {
                alert('Inspect Element dinonaktifkan!');
                e.preventDefault();
            }
        });

        // Mencegah pemilihan teks
        document.addEventListener('selectstart', function (e) {
            e.preventDefault();
        });

        // Fungsi Copy-to-Clipboard
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(function () {
                alert('Nomor berhasil disalin: ' + text);
            }).catch(function (err) {
                alert('Gagal menyalin nomor: ' + err);
            });
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Daftar Pembayaran</h1>
        <p class="section-title">📲 E-Wallet (a/n Ferdi):</p>
        <button onclick="copyToClipboard('085281629923')">DANA: 085281629923 - Novia</button>
        <button onclick="copyToClipboard('085752083533')">OVO: 085752083533 - Ferdi</button>
        <button onclick="copyToClipboard('085752083533')">GOPAY: 085752083533 - Ferdi</button>
        <button onclick="copyToClipboard('085752083533')">LinkAja: 085752083533 - Ferdi</button>
        <button onclick="copyToClipboard('085752083533')">ShopeePay: 085752083533 - Ferdi</button>

        <p class="section-title">🏦 Rekening Bank (a/n Ferdi):</p>
        <button onclick="copyToClipboard('8171066191')">BCA: 8171066191 - Ferdi</button>
        <button onclick="copyToClipboard('369901056218536')">BRI: 369901056218536 - Ferdi</button>
        <button onclick="copyToClipboard('901868798115')">Seabank: 901868798115 - Ferdi</button>

        <div class="qris-container">
            <p class="section-title">🔰 Payment QRIS:</p>
            <img src="qris.jpg" alt="Kode QRIS Pembayaran">
        </div>
    </div>
</body>
</html>
