<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Pembayaran</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        .section-title {
            text-align: center; /* Menengahkan judul */
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0 10px;
            color: #555;
        }
        .highlight-note {
            background-color: #ffe4e4;
            color: #d9534f;
            border: 1px solid #f5c6cb;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #007bb5;
        }
        .qris-container {
            text-align: center;
            margin: 20px 0;
        }
        .qris-container img {
            max-width: 280px;
            border-radius: 8px;
        }
        .confirm-note {
            text-align: center;
            background-color: #f0f8ff;
            color: #2c5f85;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
        }
        .confirm-note a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            background-color: #25D366;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .confirm-note a:hover {
            background-color: #20b456;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daftar Pembayaran</h1>
        <div class="highlight-note">
            ⚠️ <b>Catatan:</b> Klik nomor untuk menyalin otomatis ke clipboard!
        </div>

        <p class="section-title">📲 E-Wallet (a/n Ferdi):</p>
        <button onclick="copyToClipboard('085281629923')">DANA: 085281629923 - Novia</button>
        <button onclick="copyToClipboard('085752083533')">OVO: 085752083533 - Ferdi</button>
        <button onclick="copyToClipboard('085752083533')">GOPAY: 085752083533 - Ferdi</button>
        <button onclick="copyToClipboard('085752083533')">LinkAja: 085752083533 - Ferdi</button>
        <button onclick="copyToClipboard('085752083533')">ShopeePay: 085752083533 - Ferdi</button>

        <p class="section-title">🏦 Rekening Bank (a/n Ferdi):</p>
        <button onclick="copyToClipboard('8171066191')">BCA: 8171066191 - Ferdi</button>
        <button onclick="copyToClipboard('369901056218536')">BRI: 369901056218536 - Ferdi</button>
        <button onclick="copyToClipboard('901868798115')">Seabank: 901868798115 - Ferdi</button>

        <div class="qris-container">
            <p class="section-title">🔰 Payment QRIS:</p>
            <img src="qris.jpg" alt="Kode QRIS Pembayaran">
            <br>
            <a href="qris.jpg" download="Payment_QRIS.jpg">
                <button>📥 Download QRIS</button>
            </a>
        </div>

        <div class="confirm-note">
            ⚠️ Harap konfirmasi transfer ke Ferdi melalui:
            <br>
            <a href="https://wa.me/6285752083533" target="_blank">📲 Konfirmasi via WhatsApp</a>
        </div>
    </div>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Nomor berhasil disalin: ' + text);
            }).catch(err => {
                alert('Gagal menyalin nomor: ' + err);
            });
        }
    </script>
</body>
</html>
